<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/global.css">
<link rel="stylesheet" href="./assets/css/layout.css">
<link rel="stylesheet" href="./assets/css/components.css">
<link rel="stylesheet" href="./assets/css/forms.css">
<link rel="stylesheet" href="./assets/css/sidebar.css">
<link rel="stylesheet" href="./assets/css/responsive.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="./services/supabase.js"></script>
<script src="./services/auth.js"></script>
<script src="./services/sidebar.js"></script>

<style>
/* ── Change-password card ─────────────────────────────────── */
.cpw-card {
  max-width: 480px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%), var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 32px;
  box-shadow: var(--shadow-card);
}

/* Password strength bar */
.pw-strength-wrap {
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: var(--r-pill);
  overflow: hidden;
  margin-top: 8px;
}
.pw-strength-bar {
  height: 100%;
  border-radius: var(--r-pill);
  width: 0%;
  transition: width var(--t-med), background var(--t-med);
}
.pw-strength-hint {
  font-size: 11px;
  color: var(--text3);
  margin-top: 5px;
  min-height: 16px;
}

/* Field group spacing inside card */
.cpw-card .form-group { margin-bottom: 18px; }
.cpw-card .form-group:last-of-type { margin-bottom: 0; }

/* Divider */
.cpw-divider {
  height: 1px;
  background: var(--border);
  margin: 24px 0;
}

/* Alert */
.cpw-alert {
  border-radius: var(--r-md);
  padding: 12px 16px;
  font-size: 13px;
  display: none;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 20px;
  line-height: 1.5;
}
.cpw-alert.error   { display: flex; background: var(--red-bg);   border: 1px solid rgba(255,92,122,.3);   color: var(--red); }
.cpw-alert.success { display: flex; background: var(--green-bg); border: 1px solid var(--green-br); color: var(--green); }
.cpw-alert i { flex-shrink: 0; margin-top: 1px; }

/* Password toggle eye button */
.pw-field-wrap { position: relative; }
.pw-field-wrap .form-input { padding-right: 44px; }
.pw-toggle {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text3);
  cursor: pointer;
  padding: 4px;
  display: flex;
  align-items: center;
  transition: color var(--t-fast);
}
.pw-toggle:hover { color: var(--text2); }
</style>
</head>
<body>

<aside class="sidebar" id="appSidebar"></aside>
<div class="sb-overlay" id="sbOverlay"></div>
<div class="sb-mobile-bar">
  <button class="sb-hamburger" id="sbToggle" type="button">
    <i data-lucide="menu" class="icon-md"></i>
  </button>
  <span class="sb-mobile-title">Change Password</span>
</div>

<div class="page">

  <div class="page-header">
    <div>
      <h1>
        <i data-lucide="key" class="icon-xl page-icon"></i>
        Change Password
      </h1>
      <p>Verify your current password, then set a new one.</p>
    </div>
    <a href="./profile.html" class="btn btn-ghost">
      <i data-lucide="arrow-left" class="icon-sm"></i>
      Back to Profile
    </a>
  </div>

  <div class="cpw-card">

    <!-- Alert -->
    <div class="cpw-alert" id="cpwAlert">
      <i data-lucide="alert-circle" class="icon-sm"></i>
      <span id="cpwAlertMsg"></span>
    </div>

    <form id="cpwForm" novalidate>

      <!-- Current password -->
      <div class="form-group">
        <label class="form-label" for="currentPw">Current password</label>
        <div class="pw-field-wrap">
          <input class="form-input" id="currentPw" type="password"
            placeholder="Your current password" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" data-target="currentPw" title="Show / hide">
            <i data-lucide="eye" class="icon-sm"></i>
          </button>
        </div>
      </div>

      <div class="cpw-divider"></div>

      <!-- New password -->
      <div class="form-group">
        <label class="form-label" for="newPw">New password</label>
        <div class="pw-field-wrap">
          <input class="form-input" id="newPw" type="password"
            placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8">
          <button type="button" class="pw-toggle" data-target="newPw" title="Show / hide">
            <i data-lucide="eye" class="icon-sm"></i>
          </button>
        </div>
        <div class="pw-strength-wrap">
          <div class="pw-strength-bar" id="pwStrengthBar"></div>
        </div>
        <div class="pw-strength-hint" id="pwStrengthHint"></div>
      </div>

      <!-- Confirm new password -->
      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label" for="confirmPw">Confirm new password</label>
        <div class="pw-field-wrap">
          <input class="form-input" id="confirmPw" type="password"
            placeholder="Repeat new password" autocomplete="new-password" required minlength="8">
          <button type="button" class="pw-toggle" data-target="confirmPw" title="Show / hide">
            <i data-lucide="eye" class="icon-sm"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="cpwSubmit">
        <span id="cpwSpinner" style="display:none">
          <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            style="animation:spin .8s linear infinite">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </span>
        <i data-lucide="shield-check" class="icon-sm" id="cpwBtnIcon"></i>
        <span id="cpwBtnLabel">Update Password</span>
      </button>

    </form>
  </div><!-- /cpw-card -->
</div><!-- /page -->

<script>
'use strict';

/* ── Password strength ───────────────────────────────────── */
function calcStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  return score; // 0–5
}

document.getElementById('newPw').addEventListener('input', function () {
  const score = calcStrength(this.value);
  const bar   = document.getElementById('pwStrengthBar');
  const hint  = document.getElementById('pwStrengthHint');
  const pct   = Math.round((score / 5) * 100);
  const palette = ['', 'var(--red)', 'var(--amber)', 'var(--amber)', 'var(--green)', 'var(--green)'];
  const labels  = ['', 'Very weak', 'Weak', 'Fair', 'Strong', 'Very strong'];
  bar.style.width      = this.value ? pct + '%' : '0%';
  bar.style.background = palette[score] || 'transparent';
  hint.textContent     = this.value ? labels[score] : '';
  hint.style.color     = palette[score] || 'var(--text3)';
});

/* ── Show / hide password toggle ─────────────────────────── */
document.querySelectorAll('.pw-toggle').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById(btn.dataset.target);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.querySelector('i').setAttribute('data-lucide', isText ? 'eye' : 'eye-off');
    lucide.createIcons({ nodes: [btn] });
  });
});

/* ── Alert helpers ───────────────────────────────────────── */
function showAlert(msg, type) {
  const el  = document.getElementById('cpwAlert');
  const msg_el = document.getElementById('cpwAlertMsg');
  el.className = 'cpw-alert ' + type;
  msg_el.textContent = msg;
  el.querySelector('i').setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'alert-circle');
  lucide.createIcons({ nodes: [el] });
}
function clearAlert() {
  document.getElementById('cpwAlert').className = 'cpw-alert';
}

/* ── Submit ──────────────────────────────────────────────── */
document.getElementById('cpwForm').addEventListener('submit', async e => {
  e.preventDefault();
  clearAlert();

  const currentPw = document.getElementById('currentPw').value;
  const newPw     = document.getElementById('newPw').value;
  const confirmPw = document.getElementById('confirmPw').value;

  if (newPw.length < 8) {
    showAlert('New password must be at least 8 characters.', 'error'); return;
  }
  if (newPw !== confirmPw) {
    showAlert('New passwords do not match.', 'error'); return;
  }
  if (currentPw === newPw) {
    showAlert('New password must be different from your current password.', 'error'); return;
  }

  const submitBtn   = document.getElementById('cpwSubmit');
  const spinner     = document.getElementById('cpwSpinner');
  const btnIcon     = document.getElementById('cpwBtnIcon');
  const btnLabel    = document.getElementById('cpwBtnLabel');

  submitBtn.disabled  = true;
  spinner.style.display = 'inline-flex';
  btnIcon.style.display = 'none';
  btnLabel.textContent  = 'Updating…';

  try {
    /* 1 — verify current password by re-authenticating */
    const user  = (await Auth.getSession())?.user;
    if (!user?.email) throw new Error('Session expired — please sign in again.');

    const { error: signInErr } = await window._sb.auth.signInWithPassword({
      email:    user.email,
      password: currentPw,
    });
    if (signInErr) throw new Error('Current password is incorrect.');

    /* 2 — update to new password */
    const { error: updateErr } = await window._sb.auth.updateUser({ password: newPw });
    if (updateErr) throw updateErr;

    showAlert('Password updated successfully. Redirecting to your profile…', 'success');
    document.getElementById('cpwForm').reset();
    document.getElementById('pwStrengthBar').style.width = '0%';
    document.getElementById('pwStrengthHint').textContent = '';

    setTimeout(() => { window.location.href = './profile.html'; }, 2000);

  } catch (err) {
    showAlert(err.message || 'Something went wrong. Please try again.', 'error');
  } finally {
    submitBtn.disabled    = false;
    spinner.style.display = 'none';
    btnIcon.style.display = '';
    btnLabel.textContent  = 'Update Password';
  }
});

/* ── Init ────────────────────────────────────────────────── */
async function init() {
  const session = await Auth.requireAuth();
  if (!session) return;

  Sidebar.init('profile');
  const role = await Auth.getRole();
  Sidebar.setUser(session.user, role);
  lucide.createIcons();
}

init();
</script>
</body>
</html>
