<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — So2alGawab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./services/supabase.js"></script>

<style>
*{ box-sizing:border-box; margin:0; padding:0; }

body{
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#f1f5f9;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.card{
  width:100%;
  max-width:400px;
  background:#1e293b;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:40px;
  box-shadow:0 24px 64px rgba(0,0,0,0.5);
}

.logo{
  text-align:center;
  margin-bottom:32px;
}

.logo-icon{
  font-size:48px;
  display:block;
  margin-bottom:12px;
}

.logo h1{
  font-size:22px;
  font-weight:700;
  margin-bottom:4px;
}

.logo p{
  font-size:14px;
  color:#64748b;
}

.tabs{
  display:flex;
  gap:0;
  background:#0f172a;
  border-radius:10px;
  padding:3px;
  margin-bottom:28px;
}

.tab{
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
  background:transparent;
  color:#64748b;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  transition:.15s;
}

.tab.active{
  background:#1e293b;
  color:#f1f5f9;
  box-shadow:0 1px 4px rgba(0,0,0,0.3);
}

.form-group{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:13px;
  font-weight:500;
  color:#94a3b8;
  margin-bottom:6px;
}

input{
  width:100%;
  background:#0f172a;
  border:1px solid rgba(255,255,255,0.1);
  border-radius:10px;
  padding:11px 14px;
  color:#f1f5f9;
  font-family:'Inter',sans-serif;
  font-size:14px;
  transition:.15s;
}

input:focus{
  outline:none;
  border-color:#2563eb;
  box-shadow:0 0 0 3px rgba(37,99,235,0.15);
}

input::placeholder{ color:#475569; }

.btn-primary{
  width:100%;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:10px;
  padding:12px;
  font-family:'Inter',sans-serif;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:.15s;
  margin-top:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn-primary:hover{ background:#1d4ed8; }
.btn-primary:disabled{ opacity:.5; cursor:not-allowed; }

.alert{
  border-radius:10px;
  padding:12px 14px;
  font-size:13px;
  margin-bottom:16px;
  display:none;
}

.alert.error{
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3);
  color:#fca5a5;
}

.alert.success{
  background:rgba(34,197,94,0.1);
  border:1px solid rgba(34,197,94,0.3);
  color:#86efac;
}

.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin .6s linear infinite;
  display:none;
}

@keyframes spin{ to{ transform:rotate(360deg); } }

.signup-note{
  margin-top:20px;
  text-align:center;
  font-size:12px;
  color:#475569;
  line-height:1.6;
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="logo-icon">🎮</span>
    <h1>So2alGawab</h1>
    <p>Sign in to access the dashboard</p>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
    <button class="tab" id="tabSignUp" onclick="switchTab('signup')">Create Account</button>
  </div>

  <div id="alertBox" class="alert"></div>

  <form id="authForm" onsubmit="handleSubmit(event)">
    <div class="form-group">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <span class="spinner" id="spinner"></span>
      <span id="submitLabel">Sign In</span>
    </button>
  </form>

  <div class="signup-note" id="signupNote" style="display:none;">
    After creating your account, an admin must assign you a role before you can edit content.
    The first registered user automatically becomes super_admin.
  </div>
</div>

<script>
let currentTab = 'signin';

function switchTab(tab) {
  currentTab = tab;
  const isSignUp = tab === 'signup';

  document.getElementById('tabSignIn').classList.toggle('active', !isSignUp);
  document.getElementById('tabSignUp').classList.toggle('active', isSignUp);
  document.getElementById('submitLabel').textContent = isSignUp ? 'Create Account' : 'Sign In';
  document.getElementById('signupNote').style.display = isSignUp ? 'block' : 'none';
  document.getElementById('password').autocomplete = isSignUp ? 'new-password' : 'current-password';
  hideAlert();
}

function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = 'alert ' + type;
  box.style.display = 'block';
}

function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}

function setLoading(loading) {
  document.getElementById('submitBtn').disabled = loading;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
}

async function handleSubmit(e) {
  e.preventDefault();
  hideAlert();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  setLoading(true);
  try {
    if (currentTab === 'signin') {
      const { data, error } = await window._sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      redirectAfterLogin();
    } else {
      const { data, error } = await window._sb.auth.signUp({ email, password });
      if (error) throw error;
      if (data.session) {
        redirectAfterLogin();
      } else {
        showAlert('Account created! Check your email to confirm, then sign in.', 'success');
        switchTab('signin');
      }
    }
  } catch (err) {
    showAlert(err.message || 'Authentication failed. Please try again.');
  } finally {
    setLoading(false);
  }
}

function redirectAfterLogin() {
  const params   = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect');
  if (redirect) {
    window.location.replace(decodeURIComponent(redirect));
  } else {
    window.location.replace('./dashboard.html');
  }
}

/* Check if already authenticated — skip login screen */
async function checkExistingSession() {
  const { data: { session } } = await window._sb.auth.getSession();
  if (session) redirectAfterLogin();
}

checkExistingSession();
</script>
</body>
</html>
