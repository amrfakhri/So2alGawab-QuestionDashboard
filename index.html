<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — So2alGawab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/global.css">
<link rel="stylesheet" href="./assets/css/auth.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./services/supabase.js"></script>
<script src="./services/auth.js"></script>
</head>
<body>

<div class="auth-card">
  <div class="logo">
    <span class="logo-icon">🎮</span>
    <h1>So2alGawab</h1>
    <p>Sign in to access the dashboard</p>
  </div>

  <div id="alertBox" class="alert"></div>

  <form id="authForm" onsubmit="handleSubmit(event)">
    <div class="form-group">
      <label for="email">Email address</label>
      <input id="email" type="email" placeholder="you@example.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="••••••••" required autocomplete="current-password" minlength="6">
    </div>

    <button type="submit" class="btn-primary" id="submitBtn">
      <span class="spinner" id="spinner"></span>
      <span id="submitLabel">Sign In</span>
    </button>
  </form>

</div>

<!-- Pending approval screen (hidden by default) -->
<div id="pendingScreen" class="pending-overlay">
  <div class="pending-card">
    <div class="pending-icon">⏳</div>
    <h2>Awaiting Approval</h2>
    <p>
      Your account has been created and is waiting for a super admin to approve it.
      You'll be able to sign in once your access is confirmed.
    </p>
    <button class="btn-sign-out" onclick="Auth.signOut()">Sign Out</button>
  </div>
</div>

<script>
function showAlert(msg, type = 'error') {
  const box = document.getElementById('alertBox');
  box.textContent = msg;
  box.className = 'alert ' + type;
  box.style.display = 'block';
}

function hideAlert() {
  document.getElementById('alertBox').style.display = 'none';
}

function setLoading(loading) {
  document.getElementById('submitBtn').disabled = loading;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
}

async function handleSubmit(e) {
  e.preventDefault();
  hideAlert();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  setLoading(true);
  try {
    const { data, error } = await window._sb.auth.signInWithPassword({ email, password });
    if (error) throw error;
    redirectAfterLogin();
  } catch (err) {
    showAlert(err.message || 'Authentication failed. Please try again.');
  } finally {
    setLoading(false);
  }
}

function redirectAfterLogin() {
  const params   = new URLSearchParams(window.location.search);
  const redirect = params.get('redirect');
  if (redirect) {
    window.location.replace(decodeURIComponent(redirect));
  } else {
    window.location.replace('./dashboard.html');
  }
}

/* Show pending screen if redirected here with ?pending=1 */
const params = new URLSearchParams(window.location.search);
if (params.get('pending') === '1') {
  document.getElementById('pendingScreen').style.display = 'flex';
} else {
  /* Check if already authenticated — skip login screen */
  (async () => {
    const session = await Auth.getSession();
    if (session) {
      const role = await Auth.getRole();
      if (role === 'pending') {
        document.getElementById('pendingScreen').style.display = 'flex';
      } else {
        redirectAfterLogin();
      }
    }
  })();
}
</script>
</body>
</html>
