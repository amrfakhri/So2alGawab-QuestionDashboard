<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Game Questions Viewer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/global.css">
<link rel="stylesheet" href="./assets/css/layout.css">
<link rel="stylesheet" href="./assets/css/dashboard.css">
<link rel="stylesheet" href="./assets/css/responsive.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="./services/supabase.js"></script>
<script src="./services/auth.js"></script>
</head>
<body>

<div class="topbar">
  <a id="btnUsers" href="./users.html" class="topbar-nav-link" style="display:none;">
    <i data-lucide="users" class="icon-sm"></i> Users
  </a>
  <div id="userBar" class="topbar-user-bar"></div>
</div>

<div class="container">

    <div class="hero">
        <h1><i data-lucide="gamepad-2" class="icon-xl"></i> Game Questions Dashboard</h1>
        <p>Automatically loads gamedata1.json and lets you upload another JSON file anytime.</p>

        <div class="upload-box">
            <h2>Load Game Questions</h2>
            <p>Select a question list from Supabase, or upload a local JSON file to preview.</p>
            <div class="actions">
                <select id="listSelector" class="list-selector">
                    <option value="">— Select a List —</option>
                </select>
                <button class="button" id="loadSupabaseBtn">
                    <i data-lucide="database" class="icon-sm"></i> Load List
                </button>
                <label class="button" for="fileInput">
                    <i data-lucide="folder-open" class="icon-sm"></i> Upload JSON
                </label>
                <input type="file" id="fileInput" accept=".json">
                <a class="button button-purple" href="./database.html">
                    <i data-lucide="layout-dashboard" class="icon-sm"></i> Database
                </a>
            </div>
            <div class="file-name" id="fileName">Connecting to Supabase…</div>
        </div>
    </div>

    <div id="app">
        <div class="empty">
            Waiting for JSON upload...
        </div>
    </div>

</div>

<script>

const fileInput       = document.getElementById('fileInput');
const fileName        = document.getElementById('fileName');
const listSelector    = document.getElementById('listSelector');
const loadSupabaseBtn = document.getElementById('loadSupabaseBtn');

/* ---- Bootstrap: check auth then connect to Supabase ---- */
async function initDashboard() {
    const session = await Auth.requireAuth();
    if (!session) return; // redirecting to login

    Auth.renderUserChip(document.getElementById('userBar'));
    if (await Auth.isSuperAdmin()) {
        document.getElementById('btnUsers').style.display = 'inline-flex';
    }

    try {
        const ok = await window.SupabaseDB.ping();
        if (!ok) {
            fileName.innerHTML = '<i data-lucide="triangle-alert" class="icon-sm"></i> Could not reach Supabase. Upload a local JSON file to preview.';
            lucide.createIcons();
            return;
        }

        const lists = await window.SupabaseDB.getLists();

        if (!lists.length) {
            fileName.innerHTML = 'No question lists found. Create one in the <a href="./database.html" style="color:#60a5fa;">Database</a>.';
            return;
        }

        lists.forEach(list => {
            const opt = document.createElement('option');
            opt.value       = list.id;
            opt.textContent = `${list.title} (${list.questions.length} questions)`;
            listSelector.appendChild(opt);
        });

        // Auto-load the most recent list
        listSelector.value = lists[0].id;
        await loadList(lists[0].id, lists[0].title);

    } catch (err) {
        console.error(err);
        fileName.innerHTML = '<i data-lucide="triangle-alert" class="icon-sm"></i> Supabase error: ' + err.message;
        lucide.createIcons();
    }
}

/* ---- Load a specific list from Supabase ---- */
async function loadList(listId, listTitle) {
    if (!listId) return;
    fileName.innerHTML = 'Loading…';
    try {
        const list = await window.SupabaseDB.getList(listId);
        if (!list) throw new Error('List not found');

        const catMap = {};
        (list.categories || []).forEach(c => { catMap[c.id] = c.name; });

        fileName.innerHTML = `<i data-lucide="check-circle" class="icon-sm"></i> Loaded: <strong>${list.title}</strong> — ${list.questions.length} questions`;
        lucide.createIcons();
        render(list.questions, catMap);
    } catch (err) {
        console.error(err);
        fileName.innerHTML = `<i data-lucide="x-circle" class="icon-sm"></i> Failed to load list: ` + err.message;
        lucide.createIcons();
    }
}

/* ---- Button: load selected list ---- */
loadSupabaseBtn.addEventListener('click', () => {
    const id = listSelector.value;
    if (id) loadList(id);
});

/* ---- File upload: local JSON preview (kept for convenience) ---- */
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
        const text = await file.text();
        const json = JSON.parse(text);
        fileName.innerHTML = `<i data-lucide="folder-open" class="icon-sm"></i> Loaded local file: ${file.name}`;
        lucide.createIcons();
        render(json.data || [], {});
    } catch (err) {
        fileName.innerHTML = '<i data-lucide="x-circle" class="icon-sm"></i> Invalid JSON file';
        lucide.createIcons();
    }
});

/* ---- Render questions grouped by category ---- */
function render(items, catMap) {
    const grouped = {};
    items.forEach(item => {
        const cat = item.categoryId || 'Unknown';
        (grouped[cat] = grouped[cat] || []).push(item);
    });

    const app = document.getElementById('app');
    app.innerHTML = '';

    const catIds = Object.keys(grouped);
    if (!catIds.length) {
        app.innerHTML = '<div class="empty">No questions found.</div>';
        return;
    }

    catIds.forEach(catId => {
        const section = document.createElement('section');
        section.className = 'category';
        const title = catMap[catId] || catId;
        section.innerHTML = `
            <div class="category-title">${title}</div>
            <div class="grid">
                ${grouped[catId].map(item => createCard(item)).join('')}
            </div>
        `;
        app.appendChild(section);
    });

    lucide.createIcons();
}

function createCard(item) {
    const q = item.GamesQuestion || {};

    let media = '';
    if (q.image && q.image[0]) {
        media = `<img src="${q.image[0]}" alt="">`;
    } else if (q.video && q.video[0]) {
        media = `<video controls><source src="${q.video[0]}" type="video/mp4"></video>`;
    }

    const audio = (q.audio && q.audio[0])
        ? `<audio controls><source src="${q.audio[0]}"></audio>`
        : '';

    return `
        <div class="card">
            ${media}
            <div class="content">
                <div class="badges">
                    <div class="badge"><i data-lucide="star" class="icon-xs"></i> ${item.points || 0} Points</div>
                    <div class="badge">${item.buttonClick || ''}</div>
                    <div class="badge">${q.questionTypeView || ''}</div>
                </div>
                <div class="question">${q.question || ''}</div>
                <div class="answer">
                    <small>Correct Answer</small>
                    ${q.correctAnswer || ''}
                </div>
                ${audio}
                <div class="meta">
                    <div>Class: ${q.class || '-'}</div>
                    <div>Layout: ${q.layoutTemplate || '-'}</div>
                </div>
            </div>
        </div>
    `;
}

initDashboard().then(() => lucide.createIcons());

</script>

</body>
</html>
