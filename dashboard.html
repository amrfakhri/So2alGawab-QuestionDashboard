<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Game Questions Viewer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="./services/supabase.js"></script>
<script src="./services/auth.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Cairo',sans-serif;
    background:#0f172a;
    color:#fff;
}

.container{
    max-width:1400px;
    margin:auto;
    padding:32px;
}

.hero{
    margin-bottom:32px;
}

.hero h1{
    font-size:42px;
    margin:0 0 12px;
    text-align:center;
}

.hero p{
    color:#94a3b8;
    margin:0;
    text-align:center;
}

.upload-box{
    margin-top:24px;
    border:2px dashed rgba(255,255,255,0.2);
    border-radius:24px;
    padding:40px;
    text-align:center;
    background:rgba(255,255,255,0.03);
}

.upload-box input{
    margin-top:16px;
}

.actions{
    display:flex;
    gap:12px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:20px;
}

.button{
    border:none;
    background:#2563eb;
    color:white;
    padding:12px 20px;
    border-radius:14px;
    font-family:'Cairo',sans-serif;
    font-size:14px;
    cursor:pointer;
    transition:0.2s ease;
    text-decoration:none;
}

.button:hover{
    opacity:0.9;
    transform:translateY(-1px);
}

.file-name{
    margin-top:14px;
    color:#cbd5e1;
    font-size:14px;
}

.category{
    margin-top:48px;
}

.category-title{
    position:sticky;
    text-align:left;
    top:0;
    background:rgba(15,23,42,0.9);
    backdrop-filter:blur(10px);
    padding:18px 0;
    font-size:28px;
    font-weight:700;
    z-index:10;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:linear-gradient(180deg,#1e293b,#111827);
    border-radius:24px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.2s ease;
}

.card:hover{
    transform:translateY(-4px);
}

.card img,
.card video{
    width:100%;
    height:220px;
    object-fit:cover;
    background:#020617;
}

.content{
    padding:20px;
}

.badges{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:16px;
}

.badge{
    background:rgba(255,255,255,0.08);
    color:#cbd5e1;
    padding:6px 12px;
    border-radius:999px;
    font-size:12px;
}

.question{
    font-size:20px;
    font-weight:700;
    margin-bottom:16px;
    line-height:1.7;
}

.answer{
    background:rgba(34,197,94,0.12);
    border:1px solid rgba(34,197,94,0.3);
    border-radius:16px;
    padding:14px;
}

.answer small{
    display:block;
    color:#86efac;
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:0.08em;
}

audio{
    width:100%;
    margin-top:16px;
}

.meta{
    margin-top:16px;
    color:#94a3b8;
    font-size:14px;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
}

.empty{
    text-align:center;
    color:#64748b;
    margin-top:40px;
}

.topbar{
    background:rgba(15,23,42,0.95);
    border-bottom:1px solid rgba(255,255,255,0.07);
    padding:0 32px;
    height:52px;
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(12px);
}
</style>
</head>
<body>

<div class="topbar" id="userBar"></div>

<div class="container">

    <div class="hero">
        <h1>🎮 Game Questions Dashboard</h1>
        <p>Automatically loads gamedata1.json and lets you upload another JSON file anytime.</p>

        <div class="upload-box">
            <h2>Load Game Questions</h2>
            <p>Select a question list from Supabase, or upload a local JSON file to preview.</p>
            <div class="actions">
                <select id="listSelector" style="background:#1e293b;color:#fff;border:1px solid rgba(255,255,255,0.2);padding:12px 16px;border-radius:14px;font-family:'Cairo',sans-serif;font-size:14px;cursor:pointer;min-width:220px;">
                    <option value="">— Select a List —</option>
                </select>
                <button class="button" id="loadSupabaseBtn">🗄 Load List</button>
                <label class="button" for="fileInput">📁 Upload JSON</label>
                <input type="file" id="fileInput" accept=".json" hidden>
                <a class="button" href="./database.html" style="background:#7c3aed;">
                    🗄 Database
                </a>
            </div>
            <div class="file-name" id="fileName">Connecting to Supabase…</div>
        </div>
    </div>

    <div id="app">
        <div class="empty">
            Waiting for JSON upload...
        </div>
    </div>

</div>

<script>

const fileInput       = document.getElementById('fileInput');
const fileName        = document.getElementById('fileName');
const listSelector    = document.getElementById('listSelector');
const loadSupabaseBtn = document.getElementById('loadSupabaseBtn');

/* ---- Bootstrap: check auth then connect to Supabase ---- */
async function initDashboard() {
    const session = await Auth.requireAuth();
    if (!session) return; // redirecting to login

    Auth.renderUserChip(document.getElementById('userBar'));

    try {
        const ok = await window.SupabaseDB.ping();
        if (!ok) {
            fileName.innerHTML = '⚠️ Could not reach Supabase. Upload a local JSON file to preview.';
            return;
        }

        const lists = await window.SupabaseDB.getLists();

        if (!lists.length) {
            fileName.innerHTML = 'No question lists found. Create one in the <a href="./database.html" style="color:#60a5fa;">Database</a>.';
            return;
        }

        lists.forEach(list => {
            const opt = document.createElement('option');
            opt.value       = list.id;
            opt.textContent = `${list.title} (${list.questions.length} questions)`;
            listSelector.appendChild(opt);
        });

        // Auto-load the most recent list
        listSelector.value = lists[0].id;
        await loadList(lists[0].id, lists[0].title);

    } catch (err) {
        console.error(err);
        fileName.innerHTML = '⚠️ Supabase error: ' + err.message;
    }
}

/* ---- Load a specific list from Supabase ---- */
async function loadList(listId, listTitle) {
    if (!listId) return;
    fileName.innerHTML = 'Loading…';
    try {
        const list = await window.SupabaseDB.getList(listId);
        if (!list) throw new Error('List not found');

        const catMap = {};
        (list.categories || []).forEach(c => { catMap[c.id] = c.name; });

        fileName.innerHTML = `✅ Loaded: <strong>${list.title}</strong> — ${list.questions.length} questions`;
        render(list.questions, catMap);
    } catch (err) {
        console.error(err);
        fileName.innerHTML = '❌ Failed to load list: ' + err.message;
    }
}

/* ---- Button: load selected list ---- */
loadSupabaseBtn.addEventListener('click', () => {
    const id = listSelector.value;
    if (id) loadList(id);
});

/* ---- File upload: local JSON preview (kept for convenience) ---- */
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
        const text = await file.text();
        const json = JSON.parse(text);
        fileName.innerHTML = `📁 Loaded local file: ${file.name}`;
        render(json.data || [], {});
    } catch (err) {
        fileName.innerHTML = '❌ Invalid JSON file';
    }
});

/* ---- Render questions grouped by category ---- */
function render(items, catMap) {
    const grouped = {};
    items.forEach(item => {
        const cat = item.categoryId || 'Unknown';
        (grouped[cat] = grouped[cat] || []).push(item);
    });

    const app = document.getElementById('app');
    app.innerHTML = '';

    const catIds = Object.keys(grouped);
    if (!catIds.length) {
        app.innerHTML = '<div class="empty">No questions found.</div>';
        return;
    }

    catIds.forEach(catId => {
        const section = document.createElement('section');
        section.className = 'category';
        const title = catMap[catId] || catId;
        section.innerHTML = `
            <div class="category-title">${title}</div>
            <div class="grid">
                ${grouped[catId].map(item => createCard(item)).join('')}
            </div>
        `;
        app.appendChild(section);
    });
}

function createCard(item) {
    const q = item.GamesQuestion || {};

    let media = '';
    if (q.image && q.image[0]) {
        media = `<img src="${q.image[0]}" alt="">`;
    } else if (q.video && q.video[0]) {
        media = `<video controls><source src="${q.video[0]}" type="video/mp4"></video>`;
    }

    const audio = (q.audio && q.audio[0])
        ? `<audio controls><source src="${q.audio[0]}"></audio>`
        : '';

    return `
        <div class="card">
            ${media}
            <div class="content">
                <div class="badges">
                    <div class="badge">⭐ ${item.points || 0} Points</div>
                    <div class="badge">${item.buttonClick || ''}</div>
                    <div class="badge">${q.questionTypeView || ''}</div>
                </div>
                <div class="question">${q.question || ''}</div>
                <div class="answer">
                    <small>Correct Answer</small>
                    ${q.correctAnswer || ''}
                </div>
                ${audio}
                <div class="meta">
                    <div>Class: ${q.class || '-'}</div>
                    <div>Layout: ${q.layoutTemplate || '-'}</div>
                </div>
            </div>
        </div>
    `;
}

initDashboard();

</script>

</body>
</html>
