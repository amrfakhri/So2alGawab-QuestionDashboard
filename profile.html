<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/global.css">
<link rel="stylesheet" href="./assets/css/layout.css">
<link rel="stylesheet" href="./assets/css/components.css">
<link rel="stylesheet" href="./assets/css/forms.css">
<link rel="stylesheet" href="./assets/css/sidebar.css">
<link rel="stylesheet" href="./assets/css/responsive.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="./services/supabase.js?v=20260604"></script>
<script src="./services/auth.js?v=20260604"></script>
<script src="./services/sidebar.js?v=20260604"></script>

<style>
/* ── Profile layout ───────────────────────────────────────── */
.profile-grid {
  display: grid;
  grid-template-columns: 1.1fr 0.9fr;
  gap: 20px;
  max-width: 860px;
}
@media (max-width: 900px) { .profile-grid { grid-template-columns: 1fr; } }

/* ── Profile card ─────────────────────────────────────────── */
.prof-card {
  background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%), var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 28px;
  box-shadow: var(--shadow-card);
}
.prof-card-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text3);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

/* ── Identity row ─────────────────────────────────────────── */
.prof-identity {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}

/* Avatar wrapper — holds the circle + upload overlay */
.prof-avatar-wrap {
  position: relative;
  flex-shrink: 0;
  width: 60px;
  height: 60px;
}
.prof-avatar {
  width:  60px;
  height: 60px;
  border-radius: 50%;
  background: var(--grad-gold);
  color: var(--fg-on-gold);
  font-size: 22px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: var(--glow-gold-sm);
  text-transform: uppercase;
  letter-spacing: .02em;
}
.prof-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 50%;
}

/* Camera overlay — appears on hover */
.prof-avatar-btn {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity var(--t-fast);
  cursor: pointer;
  border: none;
}
.prof-avatar-wrap:hover .prof-avatar-btn { opacity: 1; }

/* Upload status */
.prof-upload-status {
  font-size: 11px;
  margin-top: 6px;
  min-height: 16px;
  display: none;
}
.prof-upload-status.uploading { display: block; color: var(--text3); }
.prof-upload-status.error     { display: block; color: var(--red); }
.prof-upload-status.success   { display: block; color: var(--green); }

.prof-name  { font-size: 16px; font-weight: 700; color: var(--text); }
.prof-email { font-size: 12px; color: var(--text3); margin-top: 3px; word-break: break-all; }

/* ── Detail rows ──────────────────────────────────────────── */
.prof-rows { display: flex; flex-direction: column; }
.prof-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
}
.prof-row:last-child { border-bottom: none; }
.prof-row-lbl { font-size: 13px; color: var(--text3); font-weight: 500; }
.prof-row-val { font-size: 13px; color: var(--text2); text-align: right; }

/* ── Security card ────────────────────────────────────────── */
.sec-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.sec-row:first-child { padding-top: 0; }
.sec-row:last-child  { border-bottom: none; padding-bottom: 0; }
.sec-row-lbl { font-size: 14px; font-weight: 600; color: var(--text); }
.sec-row-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
</style>
</head>
<body>

<aside class="sidebar" id="appSidebar"></aside>
<div class="sb-overlay" id="sbOverlay"></div>
<div class="sb-mobile-bar">
  <button class="sb-hamburger" id="sbToggle" type="button">
    <i data-lucide="menu" class="icon-md"></i>
  </button>
  <span class="sb-mobile-title">My Profile</span>
</div>

<div class="page">

  <div class="page-header">
    <div>
      <h1>
        <i data-lucide="user-circle" class="icon-xl page-icon"></i>
        My Profile
      </h1>
      <p>Manage your account details and security settings.</p>
    </div>
    <a href="./dashboard.html" class="btn btn-ghost">
      <i data-lucide="arrow-left" class="icon-sm"></i>
      Dashboard
    </a>
  </div>

  <div class="profile-grid">

    <!-- Account card -->
    <div class="prof-card">
      <div class="prof-card-label">Account</div>

      <div class="prof-identity">
        <div class="prof-avatar-wrap">
          <div class="prof-avatar" id="profAvatar">?</div>
          <button class="prof-avatar-btn" id="profAvatarBtn" title="Upload photo" type="button">
            <i data-lucide="camera" class="icon-sm"></i>
          </button>
          <input type="file" id="profAvatarInput" accept="image/*">
        </div>
        <div>
          <div class="prof-name"  id="profName">Loading…</div>
          <div class="prof-email" id="profEmail"></div>
          <div class="prof-upload-status" id="profUploadStatus"></div>
        </div>
      </div>

      <div class="prof-rows">
        <div class="prof-row">
          <span class="prof-row-lbl">Role</span>
          <span class="sb-role" id="profRole"></span>
        </div>
        <div class="prof-row">
          <span class="prof-row-lbl">Email</span>
          <span class="prof-row-val" id="profDetailEmail">—</span>
        </div>
        <div class="prof-row">
          <span class="prof-row-lbl">Member since</span>
          <span class="prof-row-val" id="profSince">—</span>
        </div>
        <div class="prof-row">
          <span class="prof-row-lbl">Last sign-in</span>
          <span class="prof-row-val" id="profLastSignin">—</span>
        </div>
      </div>
    </div>

    <!-- Security card -->
    <div class="prof-card">
      <div class="prof-card-label">Security</div>

      <div class="sec-row">
        <div>
          <div class="sec-row-lbl">Password</div>
          <div class="sec-row-sub">Update your account password</div>
        </div>
        <a href="./change-password.html" class="btn btn-ghost btn-sm">
          <i data-lucide="key" class="icon-sm"></i>
          Change
        </a>
      </div>

      <div class="sec-row">
        <div>
          <div class="sec-row-lbl">Sign out</div>
          <div class="sec-row-sub">Sign out of this device</div>
        </div>
        <button class="btn btn-sm" id="signOutBtn"
          style="background:var(--red-bg);color:var(--red);border-color:rgba(255,92,122,.25)">
          <i data-lucide="log-out" class="icon-sm"></i>
          Sign Out
        </button>
      </div>
    </div>

  </div><!-- /profile-grid -->
</div><!-- /page -->

<script>
'use strict';

const fmt = v => v
  ? new Intl.DateTimeFormat('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }).format(new Date(v))
  : '—';

function setUploadStatus(msg, type) {
  const el = document.getElementById('profUploadStatus');
  el.className = 'prof-upload-status ' + type;
  el.textContent = msg;
}

function renderAvatar(avatarEl, avatarUrl, initials, role) {
  const avatarBg = {
    super_admin: 'var(--gold-500)',
    admin:       'var(--amber)',
    editor:      'var(--blue)',
    viewer:      'var(--text3)',
  };
  if (avatarUrl) {
    avatarEl.innerHTML = `<img src="${avatarUrl}" alt="">`;
    avatarEl.style.background = 'transparent';
    avatarEl.style.boxShadow  = 'none';
  } else {
    avatarEl.textContent = initials;
    if (avatarBg[role]) {
      avatarEl.style.background = avatarBg[role];
      avatarEl.style.color = (role === 'super_admin' || role === 'admin') ? 'var(--fg-on-gold)' : '#fff';
      avatarEl.style.boxShadow = 'none';
    }
  }
}

async function init() {
  const session = await Auth.requireAuth();
  if (!session) return;

  Sidebar.init('profile');
  const role = await Auth.getRole();
  Sidebar.setUser(session.user, role);
  lucide.createIcons();

  const user      = session.user;
  const email     = user.email || '';
  const name      = user.user_metadata?.full_name || email.split('@')[0] || 'User';
  const initials  = getInitials(name, email);
  const avatarUrl = user.user_metadata?.avatar_url || null;

  /* Avatar */
  const avatarEl = document.getElementById('profAvatar');
  renderAvatar(avatarEl, avatarUrl, initials, role);

  /* Text fields */
  document.getElementById('profName').textContent         = name;
  document.getElementById('profEmail').textContent        = email;
  document.getElementById('profDetailEmail').textContent  = email;
  document.getElementById('profSince').textContent        = fmt(user.created_at);
  document.getElementById('profLastSignin').textContent   = fmt(user.last_sign_in_at);

  /* Role badge */
  const roleEl = document.getElementById('profRole');
  roleEl.className  = 'sb-role ' + (role || '').replace('_', '-');
  roleEl.textContent = (role || '').replace('_', ' ').toUpperCase();

  /* Sign out */
  document.getElementById('signOutBtn').addEventListener('click', () => Auth.signOut());

  /* ── Avatar upload ────────────────────────────────────── */
  const avatarInput = document.getElementById('profAvatarInput');

  document.getElementById('profAvatarBtn').addEventListener('click', () => avatarInput.click());

  avatarInput.addEventListener('change', async e => {
    const file = e.target.files?.[0];
    if (!file) return;

    setUploadStatus('Uploading…', 'uploading');

    const ext  = file.name.split('.').pop().toLowerCase();
    const path = `avatars/${user.id}/avatar.${ext}`;

    const { error: upErr } = await window._sb.storage
      .from('question-media')
      .upload(path, file, { upsert: true, contentType: file.type });

    if (upErr) {
      setUploadStatus('Upload failed: ' + upErr.message, 'error');
      avatarInput.value = '';
      return;
    }

    const { data: urlData } = window._sb.storage.from('question-media').getPublicUrl(path);
    /* Cache-bust so the browser doesn't show a stale version */
    const newUrl = urlData.publicUrl + '?t=' + Date.now();

    const { error: updateErr } = await window._sb.auth.updateUser({ data: { avatar_url: newUrl } });
    if (updateErr) {
      setUploadStatus('Saved photo but failed to link: ' + updateErr.message, 'error');
      return;
    }

    renderAvatar(avatarEl, newUrl, initials, role);
    /* Refresh sidebar avatar too */
    const updatedSession = await Auth.getSession();
    if (updatedSession) Sidebar.setUser(updatedSession.user, role);

    setUploadStatus('Photo updated!', 'success');
    setTimeout(() => setUploadStatus('', ''), 3000);
    avatarInput.value = '';
  });
}

init();
</script>
</body>
</html>
